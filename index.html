function getSubLabel(path) {
  const p = path.replace(/\/$/, '');
  const parts = p.split('/');
  if (parts.length < 2) return null;
  const sub = parts[parts.length - 1];
  return sub; // e.g. "dist", "Moon Animation", "Glassmorphism-Analog..."

    empty.innerHTML = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No projects match your search.</p>`;
    grid.appendChild(empty);
    resultInfo.textContent = '';
    return;
  }
  list.forEach((p, i) => grid.appendChild(buildCard(p, i)));
  resultInfo.textContent = list.length < projects.length
    ? `Showing ${list.length} of ${projects.length} projects`
    : '';
}

render(projects);

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  if (!q) { render(projects); return; }
  render(projects.filter(p => p.name.toLowerCase().includes(q) || p.path.toLowerCase().includes(q)));
});
</script>
</body>
</html>
