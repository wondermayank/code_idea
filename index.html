<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Code Idea — by Wondermayank</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --white: #ffffff;
      --light: #f0f8ff;
      --blue-soft: #dbeeff;
      --blue-mid: #a8d4f5;
      --blue-accent: #3b9ede;
      --blue-deep: #1565a8;
      --text-dark: #0d2a45;
      --text-mid: #2b5278;
      --text-light: #5d87af;
      --border: #c0ddf5;
      --shadow: rgba(59, 158, 222, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #e8f5ff 0%, #f7fbff 50%, #dbeeff 100%);
      border-bottom: 1.5px solid var(--border);
      padding: 56px 40px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(59,158,222,0.12) 0%, transparent 70%);
      top: -200px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
    header::after {
      content: '';
      position: absolute;
      width: 300px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--blue-accent), transparent);
      bottom: 0; left: 50%;
      transform: translateX(-50%);
    }

    .header-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--blue-accent);
      margin-bottom: 14px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    h1 span {
      color: var(--blue-accent);
    }
    .header-sub {
      font-size: 15px;
      color: var(--text-light);
      font-weight: 300;
      letter-spacing: 0.02em;
    }
    .badge-count {
      display: inline-block;
      margin-top: 18px;
      background: var(--blue-accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 5px 16px;
      border-radius: 100px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      display: flex;
      justify-content: center;
      padding: 32px 20px 0;
    }
    .search-box {
      position: relative;
      width: 100%;
      max-width: 480px;
    }
    .search-box input {
      width: 100%;
      padding: 13px 20px 13px 48px;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      background: var(--light);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input::placeholder { color: var(--text-light); }
    .search-box input:focus {
      border-color: var(--blue-accent);
      box-shadow: 0 0 0 4px rgba(59,158,222,0.1);
    }
    .search-box svg {
      position: absolute;
      left: 17px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      pointer-events: none;
    }

    /* ── GRID ── */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.28s cubic-bezier(.22,.68,0,1.4),
                  box-shadow 0.28s ease,
                  border-color 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      animation: fadeUp 0.4s ease both;
    }
    .card:hover {
      transform: translateY(-5px) scale(1.01);
      box-shadow: 0 12px 36px var(--shadow), 0 2px 8px rgba(59,158,222,0.1);
      border-color: var(--blue-accent);
    }

    /* Frame hover corner borders */
    .card::before,
    .card::after,
    .card .corner-br,
    .card .corner-tl {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--blue-accent);
      border-style: solid;
      opacity: 0;
      transition: opacity 0.25s ease, width 0.25s ease, height 0.25s ease;
      z-index: 2;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 14px 0 0 0; }
    .card::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-radius: 0 14px 0 0; }
    .card .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 14px 0; }
    .card .corner-tl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-radius: 0 0 0 14px; }

    .card:hover::before,
    .card:hover::after,
    .card:hover .corner-br,
    .card:hover .corner-tl {
      opacity: 1;
      width: 26px; height: 26px;
    }

    /* Card top strip */
    .card-strip {
      height: 5px;
      background: linear-gradient(90deg, var(--blue-mid), var(--blue-accent));
      width: 0%;
      transition: width 0.35s ease;
    }
    .card:hover .card-strip { width: 100%; }

    .card-body {
      padding: 20px 18px 18px;
    }

    .card-icon {
      width: 38px; height: 38px;
      background: var(--blue-soft);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      transition: background 0.2s, transform 0.2s;
    }
    .card:hover .card-icon {
      background: var(--blue-mid);
      transform: rotate(-6deg) scale(1.1);
    }
    .card-icon svg { color: var(--blue-deep); }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--blue-accent);
      letter-spacing: 0.5px;
      padding: 5px 12px;
      border: 1.5px solid var(--blue-mid);
      border-radius: 100px;
      background: var(--light);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .card:hover .card-btn {
      background: var(--blue-accent);
      border-color: var(--blue-accent);
      color: #fff;
    }
    .card-btn svg { transition: transform 0.2s; }
    .card:hover .card-btn svg { transform: translateX(3px); }

    /* ── NO RESULTS ── */
    #no-results {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
      font-size: 15px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      border-top: 1.5px solid var(--border);
      font-size: 13px;
      color: var(--text-light);
    }
    footer a { color: var(--blue-accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1)  { animation-delay: 0.02s }
    .card:nth-child(2)  { animation-delay: 0.04s }
    .card:nth-child(3)  { animation-delay: 0.06s }
    .card:nth-child(4)  { animation-delay: 0.08s }
    .card:nth-child(5)  { animation-delay: 0.10s }
    .card:nth-child(6)  { animation-delay: 0.12s }
    .card:nth-child(7)  { animation-delay: 0.14s }
    .card:nth-child(8)  { animation-delay: 0.16s }
    .card:nth-child(9)  { animation-delay: 0.18s }
    .card:nth-child(10) { animation-delay: 0.20s }
    .card:nth-child(n+11) { animation-delay: 0.22s }

    @media (max-width: 600px) {
      header { padding: 40px 20px 36px; }
      main { padding: 28px 14px 60px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-label">Open Source Collection</div>
  <h1>Code <span>Idea</span></h1>
  <p class="header-sub">Creative CSS &amp; JavaScript experiments by <strong>Wondermayank</strong></p>
  <div class="badge-count" id="total-count">— Projects</div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Search projects…" autocomplete="off"/>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div id="no-results">No projects found for "<span id="search-term"></span>"</div>
</main>

<footer>
  Made with ♥ &nbsp;·&nbsp; <a href="https://github.com/wondermayank/code_idea" target="_blank">wondermayank / code_idea</a>
</footer>

<script>
  const BASE = "https://wondermayank.github.io/code_idea/";

  const folders = [
    "10 Different Pulse Effect",
    "10 Different Spinner",
    "3D Flipping Text",
    "3D Navigation Menu",
    "3d Card With Hover",
    "4 Dot Liquid Loader",
    "403 Landing Page",
    "9 Dot Navigation",
    "9 Dots Navigation updated",
    "Animated Skills Bar",
    "Beer 404 Page",
    "Butterfly Share Button",
    "Button Ripple Effect",
    "CSS Cube Hover effect",
    "Capture Screenshot in JavaScript",
    "Card Hover Effect V1",
    "Card Hover Effect V2",
    "Card Hover Effect V3",
    "Circular Progress Bar",
    "Corner Menu",
    "Creative Link Hover",
    "Custom Captcha Generator using JS",
    "Custom-Scrollbar",
    "Dark & Light - Calculator",
    "Detect Battery Status",
    "Digital Clock With Reflection",
    "Download Button",
    "Drop Liquid Loading",
    "Dynamic Calendar JavaScript",
    "Dynamic Stopwatch",
    "Forest Parallex Website",
    "Frame Hover Effect",
    "Full Overlay Navigation",
    "Glassmorph Calculator",
    "Glassmorph Loader",
    "Glassmorphism Analog Clock",
    "Glassmorphism Credit Card",
    "Glassmorphism Login Form",
    "Glowing Gradient Button",
    "Glowing Input Login Form",
    "Glowing Login Form",
    "Glowing Menu Hover",
    "Glowing Neon Button",
    "Glowing Neon Buttons",
    "Google Fiber Loader",
    "Gradient Button hover",
    "Hacker Login Form",
    "Heart Checkbox",
    "Heart Loader",
    "Heart Rate Animation",
    "I Love You Animation",
    "I love You Card",
    "Indian Flag using CSS",
    "Input Animation",
    "Item Card Hover Effect",
    "Juicy Hamburgers Menu",
    "Light & Dark Toggle button",
    "Lines Background Animation",
    "Liquid Loader",
    "Magic Indicator Menu",
    "Magic Navigation Menu 2",
    "Magic Navigation Menu",
    "Magic Social Share Menu",
    "Memory Card Game",
    "Moon Animation",
    "Naughty Submit Button",
    "Neon Button",
    "Neon Dash Loader",
    "Neon Navigation",
    "Neumorphism Calculator with Dark-light",
    "Neumorphism Clock",
    "Neumorphism Rocket Loader",
    "Ninja Calculator",
    "Pagination V1",
    "Parallax Scrolling Website",
    "Particles Button",
    "Password Generator",
    "Password Input Light",
    "Password Validator JS",
    "Password strength checker",
    "Product Card Info",
    "Quadratic loader",
    "Responsive Footer for Contact Us",
    "Responsive Grid Tracks",
    "Responsive Service Section",
    "Search Bar",
    "Search Box",
    "Sign up for newsletter",
    "Simple Alarm Clock",
    "Skeuomorphism-Button",
    "Skype Loader",
    "Slide out social button",
    "Sliding Product Card",
    "Snake Login Form",
    "Snake Game in JavaScript",
    "Snake Glowing Button",
    "Sneakers Product Card",
    "Social Share Button",
    "Space Parallex Scrolling"
  ];

  // Simple icon pool — cycles through
  const icons = [
    // Sparkles
    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    // Code
    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
    // Layers
    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
    // Zap
    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
    // Box
    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>`,
    // Globe
    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  ];

  const grid = document.getElementById('grid');
  const noResults = document.getElementById('no-results');
  const searchInput = document.getElementById('search');
  const totalCount = document.getElementById('total-count');

  totalCount.textContent = folders.length + ' Projects';

  function buildURL(name) {
    return BASE + encodeURIComponent(name) + '/';
  }

  function renderCards(list) {
    grid.innerHTML = '';
    if (list.length === 0) {
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';
    list.forEach((name, i) => {
      const icon = icons[i % icons.length];
      const url = buildURL(name);
      const card = document.createElement('a');
      card.className = 'card';
      card.href = url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.innerHTML = `
        <div class="corner-br"></div>
        <div class="corner-tl"></div>
        <div class="card-strip"></div>
        <div class="card-body">
          <div class="card-icon">${icon}</div>
          <div class="card-title">${name}</div>
          <span class="card-btn">
            View Demo
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  renderCards(folders);

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    document.getElementById('search-term').textContent = searchInput.value.trim();
    if (!q) { renderCards(folders); return; }
    renderCards(folders.filter(f => f.toLowerCase().includes(q)));
  });
</script>
</body>
</html>
